replicaCount: 1

image:
  repository: python
  tag: "3.13-slim"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0

securityContext:
  allowPrivilegeEscalation: true
  capabilities:
    add:
      - NET_RAW
      - NET_ADMIN

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: network-exporter.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  PING_INTERVAL: "10"
  EXPORTER_PORT: "8000"

config:
  targets:
    - address: 8.8.8.8
      ping_count: 5
      timeout: 1.0
      packet_size: 64
      protocol: icmp
      labels:
        name: google_dns
        location: global

    - address: 1.1.1.1
      ping_count: 5
      timeout: 1.0
      packet_size: 64
      protocol: icmp
      labels:
        name: cloudflare_dns
        location: global

    - address: 208.67.222.222
      ping_count: 5
      timeout: 1.0
      packet_size: 64
      protocol: icmp
      labels:
        name: opendns
        location: global

    - address: example.com
      protocol: http
      port: 80
      timeout: 5.0
      labels:
        name: example_http
        location: global

    - address: google.com
      protocol: https
      port: 443
      timeout: 5.0
      labels:
        name: google_https
        location: global

    - address: cloudflare.com
      protocol: dns
      dns_server: 1.1.1.1
      dns_port: 53
      timeout: 5.0
      labels:
        name: cloudflare_dns_resolve
        location: global

    - address: example.com
      protocol: tcp
      port: 80
      timeout: 5.0
      labels:
        name: example_tcp
        location: global

    - address: 8.8.8.8
      protocol: udp
      port: 53
      timeout: 5.0
      labels:
        name: google_dns_udp
        location: global

    - address: pool.ntp.org
      protocol: ntp
      timeout: 5.0
      ntp_version: 3
      labels:
        name: ntp_pool
        location: global

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

